services:
  postgres:
    container_name: memorynote-postgres
    image: pgvector/pgvector:pg18-trixie
    restart: unless-stopped
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=memorynote
    ports:
      - "5432:5432"
    volumes:
      - memorynote_postgres_data:/var/lib/postgresql
    networks:
      - memorynote-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    container_name: memorynote-redis
    image: redis:7
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - memorynote_redis_data:/data
    networks:
      - memorynote-dev
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M

  neo4j:
    container_name: memorynote-neo4j
    image: redplanethq/neo4j:0.1.0
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/docker1234
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use_neo4j_config=true
      - NEO4J_server_memory_heap_initial__size=128M
      - NEO4J_server_memory_heap_max__size=256M
      - NEO4J_server_memory_pagecache_size=128M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - memorynote_neo4j_data:/data
    networks:
      - memorynote-dev
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p docker1234 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

networks:
  memorynote-dev:
    name: memorynote-dev
    driver: bridge

volumes:
  memorynote_postgres_data:
  memorynote_redis_data:
  memorynote_neo4j_data:
