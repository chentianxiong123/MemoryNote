services:
  postgres:
    container_name: memorynote-postgres
    image: pgvector/pgvector:pg18-trixie
    restart: unless-stopped
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=memorynote
    ports:
      - "5432:5432"
    volumes:
      - memorynote_postgres_data:/var/lib/postgresql
    networks:
      - memorynote-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  neo4j:
    container_name: memorynote-neo4j
    image: neo4j:5
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/docker1234
      - NEO4J_server_memory_heap_initial__size=128M
      - NEO4J_server_memory_heap_max__size=256M
      - NEO4J_server_memory_pagecache_size=128M
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - memorynote_neo4j_data:/data
    networks:
      - memorynote-dev
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p docker1234 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

networks:
  memorynote-dev:
    name: memorynote-dev
    driver: bridge

volumes:
  memorynote_postgres_data:
  memorynote_neo4j_data: